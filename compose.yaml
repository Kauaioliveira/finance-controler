services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: assistente-contabil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assistente_contabil
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistente_contabil"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
